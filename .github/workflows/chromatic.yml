name: Chromatic

on: push

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Pre-build Storybook with bun so workspace deps resolve through the
      # same package manager that installed them. The chromaui action's
      # default `npm run build-storybook` previously failed on bun-installed
      # workspaces (Vite "use client" warnings → exit code 1 with no real
      # error surfaced; local `bun run build-storybook` succeeds the same
      # build cleanly).
      - name: Build Storybook
        working-directory: apps/web/client
        env:
          SKIP_ENV_VALIDATION: true
        run: bun run build-storybook --output-dir storybook-static

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/web/client
          storybookBuildDir: storybook-static

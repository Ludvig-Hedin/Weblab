name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'   # e.g. desktop-v0.1.0

permissions:
  contents: write   # needed to upload release assets

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Python 3.12 removed `distutils` from stdlib but node-gyp (used by
      # native deps like better-sqlite3) still imports it. Pin to 3.11 so
      # the native build for the Electron app succeeds on macOS/Windows.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # The desktop release only needs package files and binaries; electron-builder
      # downloads Electron during the build. Skip dependency postinstall scripts
      # so unrelated third-party network fetches cannot break installer releases
      # (for example free-email-domains fetching remote blocklists and hitting 429).
      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: bun install --frozen-lockfile --ignore-scripts

      # Stage signing + notarization credentials only when the corresponding
      # secrets are present. Writing empty CSC_LINK into the build step's env
      # confuses electron-builder (it resolves "" to cwd and reports
      # "<cwd> not a file"), so we route everything through $GITHUB_ENV which
      # silently drops blank values.
      - name: Stage Apple signing + notary credentials
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          # GitHub runs this with `bash -e`, so guard short-circuits with
          # explicit if-blocks (`[ -n "$X" ] && echo …` would abort the step
          # whenever the var is empty).
          if [ -n "$MAC_CERT_P12_BASE64" ]; then
            CERT_PATH="$RUNNER_TEMP/weblab-cert.p12"
            printf '%s' "$MAC_CERT_P12_BASE64" | base64 -d > "$CERT_PATH"
            echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
            if [ -n "$MAC_CERT_PASSWORD" ]; then
              echo "CSC_KEY_PASSWORD=$MAC_CERT_PASSWORD" >> "$GITHUB_ENV"
            fi
            echo "Mac signing cert staged."
          else
            echo "MAC_CERT_P12_BASE64 not set — build will be unsigned."
          fi

          if [ -n "$APPLE_API_KEY_P8_BASE64" ] && [ -n "$APPLE_API_KEY_ID" ]; then
            if ! [[ "$APPLE_API_KEY_ID" =~ ^[A-Za-z0-9]+$ ]]; then
              echo "::error::APPLE_API_KEY_ID must be alphanumeric" >&2
              exit 1
            fi
            mkdir -p "$HOME/.appstoreconnect/private_keys"
            KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 -d > "$KEY_PATH"
            echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
            if [ -n "$APPLE_API_ISSUER" ]; then
              echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
            fi
            echo "Notary API key staged."
          elif [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD" >> "$GITHUB_ENV"
            echo "Notary app-specific password staged."
          else
            echo "No notary credentials — notarize hook will skip."
          fi

          if [ -n "$APPLE_TEAM_ID" ]; then
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
          fi

      - name: Build macOS DMG (x64 + arm64)
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build:mac

      - name: Upload DMG artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/dist/Weblab.dmg
          overwrite_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    name: Build Windows
    # Pinned to 2022 because windows-latest now ships VS 2026 (version 18)
    # which node-gyp doesn't recognize ("unknown version 'undefined' found at
    # C:\Program Files\Microsoft Visual Studio\18\Enterprise").
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Python 3.12 removed `distutils` from stdlib but node-gyp (used by
      # native deps like better-sqlite3) still imports it. Pin to 3.11 so
      # the native build for the Electron app succeeds on macOS/Windows.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # The desktop release only needs package files and binaries; electron-builder
      # downloads Electron during the build. Skip dependency postinstall scripts
      # so unrelated third-party network fetches cannot break installer releases
      # (for example free-email-domains fetching remote blocklists and hitting 429).
      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build Windows installer
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build:win

      - name: Upload EXE artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/dist/Weblab-Setup.exe
          overwrite_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Python 3.12 removed `distutils` from stdlib but node-gyp (used by
      # native deps like better-sqlite3) still imports it. Pin to 3.11 so
      # the native build for the Electron app succeeds on macOS/Windows.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # The desktop release only needs package files and binaries; electron-builder
      # downloads Electron during the build. Skip dependency postinstall scripts
      # so unrelated third-party network fetches cannot break installer releases
      # (for example free-email-domains fetching remote blocklists and hitting 429).
      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build Linux AppImage
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build:linux

      - name: Upload AppImage artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/dist/Weblab.AppImage
          overwrite_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'   # e.g. desktop-v0.1.0

permissions:
  contents: write   # needed to upload release assets

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Python 3.12 removed `distutils` from stdlib but node-gyp (used by
      # native deps like better-sqlite3) still imports it. Pin to 3.11 so
      # the native build for the Electron app succeeds on macOS/Windows.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: bun install

      # Decode the .p8 App Store Connect API key (if the secret is present)
      # so notarytool can find it. Skipped if not configured — the build then
      # produces an unsigned DMG and the notarize hook no-ops.
      - name: Stage Apple notary API key
        if: ${{ secrets.APPLE_API_KEY_P8_BASE64 != '' }}
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          if [[ ! "$APPLE_API_KEY_ID" =~ ^[A-Za-z0-9]+$ ]]; then
            echo "::error::APPLE_API_KEY_ID must be alphanumeric" >&2
            exit 1
          fi
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 -d > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build macOS DMG (x64 + arm64)
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing — electron-builder reads CSC_LINK as a path or base64.
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          # Notarization credentials — Option A (API key) is preferred.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Option B (app-specific password) — used only if API key absent.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: bun run build:mac

      - name: Upload DMG artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/dist/Weblab.dmg
          token: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Python 3.12 removed `distutils` from stdlib but node-gyp (used by
      # native deps like better-sqlite3) still imports it. Pin to 3.11 so
      # the native build for the Electron app succeeds on macOS/Windows.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: bun install

      - name: Build Windows installer
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build:win

      - name: Upload EXE artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/dist/Weblab-Setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Python 3.12 removed `distutils` from stdlib but node-gyp (used by
      # native deps like better-sqlite3) still imports it. Pin to 3.11 so
      # the native build for the Electron app succeeds on macOS/Windows.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: bun install

      - name: Build Linux AppImage
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build:linux

      - name: Upload AppImage artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/dist/Weblab.AppImage
          token: ${{ secrets.GITHUB_TOKEN }}

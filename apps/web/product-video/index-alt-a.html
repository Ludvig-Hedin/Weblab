<!doctype html>

    <title>Weblab — Skip the handoff</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #07070a; font-family: 'Inter', system-ui, sans-serif; color: #fafaf9; -webkit-font-smoothing: antialiased; }
      #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
      #root > .clip { position: absolute; inset: 0; }
    </style>
    <script>
      window.__tailwindReady = new Promise(function (resolve) {
        var loaded = document.readyState === 'complete', resolved = false, observer;
        function readTailwindCss() { var styles = document.querySelectorAll('style'); for (var i = styles.length-1; i >= 0; i--) { var t = styles[i].textContent || ''; if (t.indexOf('tailwindcss v') !== -1) return t; } return ''; }
        function finish() { if (resolved || !loaded || !readTailwindCss()) return; resolved = true; if (observer) observer.disconnect(); resolve(true); }
        observer = new MutationObserver(finish); observer.observe(document.documentElement, { childList: true, subtree: true, characterData: true });
        if (loaded) finish(); else window.addEventListener('load', function () { loaded = true; finish(); }, { once: true });
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.2.4/dist/index.global.js" integrity="sha384-v5YF9xS+gLRWdvrQ0u/WRbCkjSIH0NjHIPe8tBL1ZRrmI7PiSH6LLdzs0aAIMCuh" crossorigin="anonymous"></script>
  </head>

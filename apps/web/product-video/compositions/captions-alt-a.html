<!doctype html>
<html>
<head>
<style>
  .caps { position: absolute; inset: 0; font-family: 'Inter', system-ui, sans-serif; pointer-events: none; }
  .caps .cap { position: absolute; left: 50%; bottom: 110px; transform: translateX(-50%); padding: 13px 28px; border-radius: 999px; background: rgba(10,10,14,0.82); border: 1px solid rgba(61,139,253,0.2); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); color: #fafaf9; font-size: 32px; font-weight: 500; letter-spacing: -0.005em; white-space: nowrap; box-shadow: 0 18px 50px rgba(0,0,0,0.6); opacity: 0; }
  .caps .cap .em { color: #3d8bfd; }
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
</head>
<body>
<div data-composition-id="captions-alt-a" data-width="1920" data-height="1080">
  <div class="caps">
    <div class="cap" id="ca-1">Skip the handoff.</div>
    <div class="cap" id="ca-2">Edit it. <span class="em">Live.</span> Like Figma.</div>
    <div class="cap" id="ca-3">Talk to it like a teammate.</div>
    <div class="cap" id="ca-4">It uses <span class="em">your</span> style.</div>
    <div class="cap" id="ca-5">One click. <span class="em">Live.</span></div>
    <div class="cap" id="ca-6">Make something real.</div>
  </div>
</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  const caps = [
    { id: 'ca-1', start: 6.5,  end: 12.0 },
    { id: 'ca-2', start: 14.0, end: 21.0 },
    { id: 'ca-3', start: 23.5, end: 31.0 },
    { id: 'ca-4', start: 33.5, end: 41.0 },
    { id: 'ca-5', start: 44.0, end: 49.5 },
    { id: 'ca-6', start: 56.5, end: 59.5 }
  ];
  caps.forEach(function (c) {
    tl.fromTo('#' + c.id, { opacity: 0, y: 14, scale: 0.96 }, { opacity: 1, y: 0, scale: 1, duration: 0.32, ease: 'cubic-bezier(0.16, 1, 0.3, 1)' }, c.start);
    tl.to('#' + c.id, { opacity: 0, y: -8, duration: 0.28, ease: 'power2.in' }, c.end);
  });
  window.__timelines['captions-alt-a'] = tl;
</script>
</body>
</html>

<!doctype html>
<html>
<head>
<style>
  .caps { position: absolute; inset: 0; font-family: 'Inter', system-ui, sans-serif; pointer-events: none; }
  .caps .cap {
    position: absolute;
    left: 50%; bottom: 110px; transform: translateX(-50%);
    padding: 13px 28px; border-radius: 999px;
    background: rgba(10, 10, 14, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
    color: #fafaf9; font-size: 32px; font-weight: 500; letter-spacing: -0.005em;
    white-space: nowrap;
    box-shadow: 0 18px 50px rgba(0,0,0,0.6);
  }
  .caps .cap .em { color: #3d8bfd; }
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
</head>
<body>
<div data-composition-id="captions-v2" data-width="1920" data-height="1080">
  <div class="caps">
    <div class="clip cap" id="cv-1" data-start="6.5"  data-duration="3.5" data-track-index="0">A whole site, in one prompt.</div>
    <div class="clip cap" id="cv-2" data-start="14.0" data-duration="6.0" data-track-index="0">Click. Drag. <span class="em">Real</span> changes.</div>
    <div class="clip cap" id="cv-3" data-start="22.0" data-duration="6.5" data-track-index="0">Or just <span class="em">ask</span>.</div>
    <div class="clip cap" id="cv-4" data-start="32.0" data-duration="8.0" data-track-index="0">It uses <span class="em">your</span> design.</div>
    <div class="clip cap" id="cv-5" data-start="42.5" data-duration="5.5" data-track-index="0">Looks great everywhere.</div>
    <div class="clip cap" id="cv-6" data-start="51.0" data-duration="3.5" data-track-index="0">One click. <span class="em">Live.</span></div>
    <div class="clip cap" id="cv-7" data-start="56.0" data-duration="3.0" data-track-index="0">Make something real.</div>
  </div>
</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  ['cv-1','cv-2','cv-3','cv-4','cv-5','cv-6','cv-7'].forEach(function (id) {
    const el = document.getElementById(id);
    if (!el) return;
    const start = parseFloat(el.getAttribute('data-start'));
    tl.fromTo('#' + id, { opacity: 0, y: 14, scale: 0.96 }, { opacity: 1, y: 0, scale: 1, duration: 0.34, ease: 'cubic-bezier(0.16, 1, 0.3, 1)' }, start);
  });
  window.__timelines['captions-v2'] = tl;
</script>
</body>
</html>

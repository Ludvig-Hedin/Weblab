<!doctype html>
<html>
<head>
<style>
  .s1 {
    position: absolute; inset: 0; overflow: hidden;
    background: radial-gradient(ellipse 80% 60% at 50% 55%, #0e0e15 0%, #07070a 70%, #050507 100%);
    font-family: 'Inter', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .s1 .mesh {
    position: absolute; inset: -10%;
    background:
      radial-gradient(ellipse 40% 50% at 30% 40%, rgba(61, 139, 253, 0.18), transparent 60%),
      radial-gradient(ellipse 35% 40% at 70% 65%, rgba(61, 139, 253, 0.08), transparent 65%);
    filter: blur(40px); opacity: 0.95;
  }
  .s1 .halo {
    position: absolute; width: 1100px; height: 1100px; border-radius: 50%;
    background: radial-gradient(circle, rgba(61,139,253,0.20) 0%, rgba(61,139,253,0.05) 35%, transparent 70%);
    filter: blur(28px); pointer-events: none;
  }
  .s1 .stack { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 40px; }
  .s1 .symbol-wrap { width: 220px; height: 220px; perspective: 1000px; }
  .s1 .symbol-wrap img { width: 100%; height: 100%; transform-origin: center; }
  .s1 .wordmark-wrap { height: 76px; overflow: hidden; }
  .s1 .wordmark-wrap img { height: 100%; }
  .s1 .url {
    position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
    color: rgba(196,196,195,0.45); font-size: 16px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 500;
  }
  .s1 .grain {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 3px 3px; pointer-events: none; opacity: 0.6;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
</head>
<body>
<div data-composition-id="scene-01-logo" data-width="1920" data-height="1080">
  <div class="s1">
    <div class="mesh" id="s1-mesh"></div>
    <div class="halo" id="s1-halo"></div>
    <div class="grain"></div>
    <div class="stack">
      <div class="symbol-wrap" id="s1-symbol-wrap">
        <img src="../assets/brand/symbol.svg" alt="Weblab" id="s1-symbol" />
      </div>
      <div class="wordmark-wrap" id="s1-wordmark-wrap">
        <img src="../assets/brand/wordmark.svg" alt="Weblab" id="s1-wordmark" />
      </div>
    </div>
    <div class="url" id="s1-url">weblab.build</div>
  </div>
</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  tl.fromTo('.s1 .mesh', { opacity: 0, scale: 1.15 }, { opacity: 1, scale: 1, duration: 1.6, ease: 'power2.out' }, 0);
  tl.fromTo('.s1 .halo', { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 1.4, ease: 'cubic-bezier(0.16, 1, 0.3, 1)' }, 0.1);
  tl.fromTo('.s1 #s1-symbol', { opacity: 0, scale: 0.78, rotateY: -16, rotateX: 6, filter: 'blur(10px)' }, { opacity: 1, scale: 1, rotateY: 0, rotateX: 0, filter: 'blur(0px)', duration: 1.0, ease: 'cubic-bezier(0.16, 1, 0.3, 1)' }, 0.3);
  tl.fromTo('.s1 #s1-wordmark', { x: -260, opacity: 0 }, { x: 0, opacity: 1, duration: 0.85, ease: 'expo.out' }, 0.7);
  tl.fromTo('.s1 #s1-url', { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 1.1);
  tl.to('.s1 .halo', { scale: 1.04, duration: 1.6, ease: 'sine.inOut', repeat: 1, yoyo: true, overwrite: 'auto' }, 0.5);
  window.__timelines['scene-01-logo'] = tl;
</script>
</body>
</html>

<!doctype html>
<html>
<head>
<style>
  .se2 { position: absolute; inset: 0; overflow: hidden; background: radial-gradient(ellipse 90% 70% at 50% 50%, #0e0e15 0%, #07070a 70%, #050507 100%); font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; }
  .se2 .mesh { position: absolute; inset: -8%; background: radial-gradient(ellipse 50% 40% at 50% 50%, rgba(61,139,253,0.20), transparent 60%); filter: blur(50px); }
  .se2 .halo { position: absolute; width: 1300px; height: 1300px; border-radius: 50%; background: radial-gradient(circle, rgba(61,139,253,0.18) 0%, rgba(61,139,253,0.04) 35%, transparent 70%); filter: blur(28px); pointer-events: none; }
  .se2 .grain { position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.018) 1px, transparent 1px); background-size: 3px 3px; opacity: 0.6; }
  .se2 .stack { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 36px; padding: 0 200px; }
  .se2 .lockup { display: flex; align-items: center; gap: 22px; }
  .se2 .lockup img.symbol { height: 88px; }
  .se2 .lockup img.wordmark { height: 60px; }
  .se2 .cta { padding: 16px 36px; border-radius: 999px; background: linear-gradient(180deg, #3d8bfd 0%, #2c6ee0 100%); color: #fff; font-size: 22px; font-weight: 500; box-shadow: 0 12px 32px rgba(61,139,253,0.42); display: flex; align-items: center; gap: 12px; }
  .se2 .cta::after { content: '→'; font-size: 22px; }
  .se2 .url { color: rgba(196,196,195,0.6); font-size: 15px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 500; margin-top: -8px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
</head>
<body>
<div data-composition-id="scene-end-v2" data-width="1920" data-height="1080">
  <div class="se2">
    <div class="mesh"></div>
    <div class="halo" id="se2-halo"></div>
    <div class="grain"></div>
    <div class="stack">
      <div class="lockup" id="se2-lockup">
        <img src="../assets/brand/symbol.svg" alt="Weblab" class="symbol" />
        <img src="../assets/brand/wordmark.svg" alt="Weblab" class="wordmark" />
      </div>
      <div class="cta" id="se2-cta">Try Weblab — free</div>
      <div class="url" id="se2-url">weblab.build</div>
    </div>
  </div>
</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  tl.fromTo('.se2 .halo', { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 1.0, ease: 'cubic-bezier(0.16, 1, 0.3, 1)' }, 0);
  tl.fromTo('.se2 #se2-lockup', { opacity: 0, y: 18, filter: 'blur(8px)' }, { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.6, ease: 'cubic-bezier(0.16, 1, 0.3, 1)' }, 0.15);
  tl.fromTo('.se2 #se2-cta', { opacity: 0, y: 14, scale: 0.94 }, { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: 'cubic-bezier(0.34, 1.56, 0.64, 1)' }, 0.45);
  tl.fromTo('.se2 #se2-url', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: 'power2.out' }, 0.85);
  tl.to('.se2 #se2-cta', { boxShadow: '0 12px 32px rgba(61,139,253,0.65)', duration: 1.0, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 1.2);
  window.__timelines['scene-end-v2'] = tl;
</script>
</body>
</html>

  <rect x="64" y="160" width="40" height="40" rx="5" fill="#0a0a0a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="112" y="160" width="40" height="40" rx="5" fill="#111111"/>
  <rect x="160" y="160" width="40" height="40" rx="5" fill="#1a1a1a"/>
